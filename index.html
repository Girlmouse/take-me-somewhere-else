<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Take Me Somewhere Else — The Bus</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111; color:#f0f0f0; font-family: Georgia, 'Times New Roman', serif; min-height:100vh; display:flex; align-items:flex-start; justify-content:center; padding: 2rem 1rem; }
#app { width:100%; max-width:480px; }
#screen-title { text-align:center; padding: 3rem 1rem 2rem; }
#screen-title h1 { font-size: 24px; font-weight: 400; letter-spacing: 4px; color:#f0f0f0; text-transform:uppercase; margin-bottom:10px; }
#screen-title .sub { font-size:12px; color:#666; letter-spacing:3px; font-family:monospace; margin-bottom:3rem; }
.story-card { background:#1a1a1a; border:1px solid #2a2a2a; border-radius:10px; padding:1.25rem; margin-bottom:12px; cursor:pointer; transition: border-color 0.2s, background 0.2s; }
.story-card:hover { background:#222; border-color:#444; }
.story-card h3 { font-size:17px; font-weight:400; color:#f0f0f0; margin-bottom:5px; }
.story-card p { font-size:13px; color:#666; font-family:monospace; }
.coming-soon { font-size:11px; color:#444; font-family:monospace; letter-spacing:2px; text-align:center; margin-top:2rem; }
#screen-story, #screen-end { display:none; }
#story-header { display:flex; align-items:center; gap:12px; margin-bottom:2rem; }
#back-btn { background:none; border:none; color:#555; cursor:pointer; font-family:monospace; font-size:12px; letter-spacing:1px; text-transform:uppercase; padding:0; }
#back-btn:hover { color:#aaa; }
#story-name { font-family:monospace; font-size:11px; letter-spacing:3px; color:#444; text-transform:uppercase; }
#story-image { text-align:center; margin:1.5rem 0 1rem; min-height:10px; }
#story-image svg { max-width:160px; }
#story-text { font-size:17px; line-height:1.85; color:#e0e0e0; margin-bottom:2rem; }
#choices { display:flex; flex-direction:column; gap:10px; margin-bottom:2rem; }
.choice-btn { background:#1a1a1a; border:1px solid #2a2a2a; border-radius:8px; padding:14px 18px; text-align:left; cursor:pointer; font-size:15px; font-family:Georgia, serif; color:#ddd; line-height:1.5; transition: background 0.2s, border-color 0.2s; }
.choice-btn:hover { background:#222; border-color:#555; }
.choice-btn:active { transform:scale(0.99); }
#progress { font-family:monospace; font-size:11px; color:#333; letter-spacing:1px; text-align:right; margin-bottom:1rem; }
#screen-end { text-align:left; }
#end-tag { font-family:monospace; font-size:11px; letter-spacing:3px; color:#444; text-transform:uppercase; margin-bottom:1.5rem; text-align:center; }
#end-image { text-align:center; margin:1rem 0 1.5rem; }
#end-text { font-size:17px; line-height:1.85; color:#e0e0e0; margin-bottom:2.5rem; }
.end-btns { display:flex; gap:10px; flex-wrap:wrap; }
.end-btn { font-family:monospace; font-size:12px; letter-spacing:2px; color:#888; background:none; border:1px solid #2a2a2a; border-radius:8px; padding:10px 20px; cursor:pointer; text-transform:uppercase; }
.end-btn:hover { border-color:#555; color:#ccc; }
.fade { animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
hr { border:none; border-top:1px solid #222; margin:1.5rem 0; }
</style>
</head>
<body>
<div id="app">

  <div id="screen-title">
    <h1>Take me somewhere else</h1>
    <div class="sub">choose your adventure</div>
    <div id="story-list"></div>
    <div class="coming-soon">more stories coming soon</div>
  </div>

  <div id="screen-story">
    <div id="story-header">
      <button id="back-btn" onclick="goHome()">← stories</button>
      <div id="story-name"></div>
    </div>
    <div id="progress"></div>
    <div id="story-image"></div>
    <div id="story-text"></div>
    <div id="choices"></div>
  </div>

  <div id="screen-end">
    <div id="end-tag">the end</div>
    <div id="end-image"></div>
    <div id="end-text"></div>
    <div class="end-btns">
      <button class="end-btn" onclick="restartStory()">play again</button>
      <button class="end-btn" onclick="goHome()">other stories</button>
    </div>
  </div>

</div>

<script>
const STORIES = [
  {
    id: "bus",
    title: "The Bus",
    tagline: "a perfectly ordinary commute",
    start: "seat",
    nodes: {
      seat: {
        text: "You had a crappy day and your feet hurt and your boss said something passive-aggressive about your report. Again. You drag yourself onto the 6:15 bus and survey your options.",
        choices: [
          { label: "By the window — lean against it, breathe", goes_to: "window" },
          { label: "Back of the bus — full view of everyone", goes_to: "back" },
          { label: "Up front, right behind the driver", goes_to: "front" }
        ]
      },
      window: {
        text: "Good choice. The city slides by in streaks of orange light. Your eyes get heavy. The hum of the engine is practically a lullaby. You think: just five minutes. Five minutes won't hurt.",
        choices: [
          { label: "Close your eyes. Just for a sec.", goes_to: "asleep" },
          { label: "Stay awake. You're not an animal.", goes_to: "awake_window" }
        ]
      },
      back: {
        text: "You slide into the back seat like a detective in a bad movie. From here you can see everyone. The woman with too many bags. The guy laughing at his phone. The kid eating chips loudly. Very loudly.",
        choices: [
          { label: "Glare at the chip kid", goes_to: "chip_kid" },
          { label: "Mind your own business and scroll your phone", goes_to: "scroll" }
        ]
      },
      front: {
        text: "You sit right behind the driver. He's got a little hula dancer on the dashboard and a photo tucked into the sun visor. A family, maybe. He hums something under his breath. It's oddly comforting.",
        choices: [
          { label: "Ask him what he's humming", goes_to: "driver_hum" },
          { label: "Just enjoy the view from the front", goes_to: "front_view" }
        ]
      },
      asleep: {
        text: "You are OUT. Deeply, embarrassingly asleep. Your mouth might be open. The bus jerks to a sudden stop and you startle awake, straightening your jacket with the dignity of someone who was definitely not just drooling.",
        image: "panic",
        choices: [
          { label: "Check your pockets. Just in case.", goes_to: "wallet_gone" },
          { label: "Pretend nothing happened and look out the window", goes_to: "wallet_later" }
        ]
      },
      awake_window: {
        text: "You resist sleep heroically. At the next stop, a small elderly woman gets on and stands right next to you, staring at your seat with the quiet power of someone who has outlived three wars.",
        choices: [
          { label: "Give her your seat", goes_to: "give_seat" },
          { label: "Pretend to be asleep", goes_to: "pretend_sleep" }
        ]
      },
      wallet_gone: {
        text: "Your hand hits your pocket. Then your other pocket. Then your jacket. Then all your pockets again in a panic spiral. Your wallet is gone. GONE. Cash, cards, your library card from 2019, the little photo of your dog — ALL GONE.",
        image: "panic",
        choices: [
          { label: "Look around frantically for the thief", goes_to: "look_around" },
          { label: "Check under the seat. Please be under the seat.", goes_to: "under_seat" }
        ]
      },
      wallet_later: {
        text: "You look out the window serenely. Three stops later you reach for your phone and your hand finds... nothing. You check your pockets. Then you remember: you fell asleep.",
        image: "panic",
        choices: [
          { label: "PANIC", goes_to: "wallet_gone" }
        ]
      },
      look_around: {
        text: "You scan every face on the bus with the energy of a conspiracy theorist. Nobody looks guilty. Everybody looks guilty. Then you notice — the guy two seats ahead is holding a wallet. A brown wallet. YOUR brown wallet.",
        choices: [
          { label: "Confront him loudly", goes_to: "confront" },
          { label: "Your phone was IN the wallet. You have no phone.", goes_to: "no_phone" }
        ]
      },
      under_seat: {
        text: "You get down on the floor of the bus. The floor of a public bus. In your work clothes. Your wallet is not there. A gum wrapper is. And something unidentifiable. But no wallet.",
        choices: [
          { label: "Sit back up. Accept your fate.", goes_to: "look_around" }
        ]
      },
      confront: {
        text: "You stand up and say, loudly: 'Excuse me. That's my wallet.' The whole bus goes quiet. The man turns around slowly. He's about 80 years old and looks deeply confused. He holds up the wallet. It has a cat on it. You do not have a cat.",
        choices: [
          { label: "Apologize profusely. Sink into the floor.", goes_to: "wrong_wallet" },
          { label: "Double down. It could be a different cat.", goes_to: "double_down" }
        ]
      },
      no_phone: {
        text: "No wallet, no phone, no money, no ID. You're basically a ghost. A very tired, work-clothes ghost on a public bus with nowhere to go.",
        image: "ghost",
        choices: [
          { label: "Ask a stranger for help", goes_to: "stranger_help" },
          { label: "Ride the bus forever. This is your life now.", goes_to: "bus_life" }
        ]
      },
      wrong_wallet: {
        text: "You apologize seventeen times. The man pats your hand and says 'happens to the best of us, sweetheart.' The woman next to him says YOUR wallet fell when you were asleep — and she picked it up to keep it safe. She hands it to you.",
        choices: [
          { label: "Take it, thank her, get off at the next stop.", goes_to: "dream_twist" }
        ]
      },
      double_down: {
        text: "You insist. He opens the wallet to show you. Inside: a library card, three photos of cats, and a rewards card for a fish restaurant. You sit down slowly. Everyone is staring.",
        choices: [
          { label: "Look out the window and pretend to be a different person", goes_to: "wrong_wallet" }
        ]
      },
      stranger_help: {
        text: "You ask the teenager across from you to borrow their phone. They look at you like you asked for a kidney. But they hand it over. You call the only number you actually know by heart.",
        choices: [
          { label: "Call your mom", goes_to: "call_mom" },
          { label: "Call your ex. You still know the number. Don't.", goes_to: "call_ex" }
        ]
      },
      bus_life: {
        text: "The bus completes its route and begins again. The driver starts nodding at you like you're a regular. At some point he offers you half a sandwich. It's surprisingly good. You have nowhere to be, apparently.",
        image: "ghost",
        choices: [
          { label: "Accept the sandwich. Lean into it.", goes_to: "dream_twist" }
        ]
      },
      call_mom: {
        text: "She picks up on the first ring. She is already in the car before you finish explaining. Of course she is.",
        choices: [
          { label: "Wait at the next stop.", goes_to: "dream_twist" }
        ]
      },
      call_ex: {
        text: "They pick up. Long pause. You explain. Longer pause. Inexplicably, they say 'I'll come get you.' The ride home is incredibly awkward and also fine. You get home. You never speak of it.",
        choices: [
          { label: "Get out of the car very quickly.", goes_to: "dream_twist" }
        ]
      },
      give_seat: {
        text: "You stand. She sits. She pats your hand and says 'you're a good one,' then ignores you completely and does her crossword. You hold the rail and feel, unexpectedly, okay.",
        choices: [
          { label: "Keep standing. Feel good about yourself.", goes_to: "dream_twist" }
        ]
      },
      pretend_sleep: {
        text: "You close your eyes. You can feel her staring. The whole bus knows. You know. Forty-five seconds pass. You open your eyes and give her the seat.",
        choices: [
          { label: "Stand up. Dignity: zero. Heart: somehow okay.", goes_to: "dream_twist" }
        ]
      },
      chip_kid: {
        text: "You make very deliberate eye contact. The kid eats another chip. Louder. You look away. The kid has won. The kid has always won.",
        choices: [
          { label: "Scroll your phone and accept defeat", goes_to: "scroll" }
        ]
      },
      scroll: {
        text: "You scroll. The algorithm feeds you exactly the right videos — a dog learning to swim, a satisfying cake cut, someone's grandma absolutely destroying at ping pong. You miss your stop.",
        choices: [
          { label: "Get off and walk back. Worth it.", goes_to: "dream_twist" }
        ]
      },
      driver_hum: {
        text: "'What are you humming?' He glances in the mirror, surprised, then smiles. 'Old song. My daughter used to ask me to sing it every night.' He hums a few bars. You don't know it, but something about it makes your chest feel lighter.",
        choices: [
          { label: "Ride in comfortable silence the rest of the way.", goes_to: "dream_twist" }
        ]
      },
      front_view: {
        text: "From up front you see the city differently — the bus parting traffic, red lights turning green like the city is letting you through. For a moment you feel like you're going somewhere important.",
        choices: [
          { label: "Get off at your stop, a little lighter than before.", goes_to: "dream_twist" }
        ]
      },
      dream_twist: {
        text: "And then — the bus lurches. Hard. Your head snaps back. Something feels wrong. The windows are the wrong color. The other passengers are all wearing hats. Identical hats. The driver turns around. He has too many teeth.\n\n'Next stop,' he says, 'is yours.'\n\nYou look down. Your hands are the wrong size.",
        image: "panic",
        choices: [
          { label: "This is fine. Totally fine.", goes_to: "deeper" },
          { label: "WAKE UP WAKE UP WAKE UP", goes_to: "wakeup" }
        ]
      },
      deeper: {
        text: "The bus stops. Outside is not your street. Outside is a enormous field of identical buses, all parked, all empty, all facing the same direction. The driver smiles with all his teeth.\n\n'You can stay,' he says. 'Most do.'\n\nYou think about your wallet. You think about your crappy day. You think: honestly, compared to THIS —",
        choices: [
          { label: "Get off the bus. Into the field.", goes_to: "ending_weird" },
          { label: "Stay on the bus. At least you know this bus.", goes_to: "wakeup" }
        ]
      },
      wakeup: {
        text: "You sit bolt upright and yell — loudly, clearly, with great conviction:\n\n'NO! DON'T TAKE MY TOES!'\n\nThe bus goes completely silent. Every single person is staring at you. A child starts crying. Someone drops their coffee.\n\nYou pat your pockets. Wallet: present. Dignity: gone. You are at your stop.",
        image: "panic",
        choices: [
          { label: "Get off this bus immediately.", goes_to: "ending_dream" }
        ]
      },
      ending_dream: {
        text: "You walk home in the cool evening air, replaying the whole thing. The thief. The wrong wallet. The cat. The too-many teeth. The field of buses.\n\nAll a dream. You fell asleep for four minutes.\n\nYour wallet was in your pocket the entire time.\n\nYou make dinner. You do not tell anyone about the toes.",
        is_ending: true,
        ending_type: "dream"
      },
      ending_weird: {
        text: "You step into the field. The buses stretch as far as you can see. Somewhere, faintly, you hear a hula dancer rattling on a dashboard.\n\nYou never find out what happens next.\n\nNeither do we.",
        is_ending: true,
        ending_type: "weird"
      },
      ending_good: {
        text: "You get home. You make something to eat, or don't. You sit on the couch for a minute. Tomorrow there will be another crappy day and another bus.\n\nBut tonight you're here, and that's enough.",
        is_ending: true,
        ending_type: "good"
      }
    }
  }
];

let currentStory = null;
let currentNode = null;
let stepCount = 0;

function goHome() {
  document.getElementById('screen-title').style.display='block';
  document.getElementById('screen-story').style.display='none';
  document.getElementById('screen-end').style.display='none';
}
function show(id) { document.getElementById(id).style.display='block'; }
function hide(id) { document.getElementById(id).style.display='none'; }

function renderStoryList() {
  document.getElementById('story-list').innerHTML = STORIES.map(s =>
    `<div class="story-card" onclick="startStory('${s.id}')">
      <h3>${s.title}</h3>
      <p>${s.tagline}</p>
    </div>`
  ).join('');
}

function startStory(id) {
  currentStory = STORIES.find(s => s.id === id);
  currentNode = currentStory.start;
  stepCount = 0;
  hide('screen-title'); hide('screen-end'); show('screen-story');
  document.getElementById('story-name').textContent = currentStory.title.toUpperCase();
  renderNode();
}

function restartStory() {
  currentNode = currentStory.start;
  stepCount = 0;
  hide('screen-end'); show('screen-story');
  renderNode();
}

function renderNode() {
  const node = currentStory.nodes[currentNode];
  if (!node) return;

  if (node.is_ending) {
    hide('screen-story'); show('screen-end');
    const endText = document.getElementById('end-text');
    endText.textContent = node.text;
    endText.className = 'fade';
    document.getElementById('end-image').innerHTML = node.ending_type === 'weird' ? getSVG('bus') : node.ending_type === 'dream' ? getSVG('zzz') : '';
    return;
  }

  stepCount++;
  document.getElementById('progress').textContent = 'step ' + stepCount;

  const textEl = document.getElementById('story-text');
  textEl.textContent = node.text;
  textEl.className = 'fade';

  document.getElementById('story-image').innerHTML = node.image ? getSVG(node.image) : '';

  document.getElementById('choices').innerHTML = node.choices.map((c,i) =>
    `<button class="choice-btn" onclick="choose(${i})">${c.label}</button>`
  ).join('');
}

function choose(i) {
  const node = currentStory.nodes[currentNode];
  currentNode = node.choices[i].goes_to;
  window.scrollTo({top:0, behavior:'smooth'});
  renderNode();
}

function getSVG(type) {
  if (type==='panic') return `<svg viewBox="0 0 180 120" xmlns="http://www.w3.org/2000/svg" style="max-width:150px;">
    <circle cx="90" cy="60" r="50" fill="none" stroke="#f0f0f0" stroke-width="2"/>
    <ellipse cx="68" cy="52" rx="16" ry="20" fill="#111" stroke="#f0f0f0" stroke-width="2"/>
    <ellipse cx="112" cy="52" rx="16" ry="20" fill="#111" stroke="#f0f0f0" stroke-width="2"/>
    <circle cx="68" cy="54" r="9" fill="#f0f0f0"/>
    <circle cx="112" cy="54" r="9" fill="#f0f0f0"/>
    <circle cx="71" cy="51" r="3.5" fill="#111"/>
    <circle cx="115" cy="51" r="3.5" fill="#111"/>
    <path d="M68 85 Q90 78 112 85" stroke="#f0f0f0" stroke-width="2" fill="none"/>
    <path d="M52 34 Q62 26 70 33" stroke="#f0f0f0" stroke-width="2" fill="none"/>
    <path d="M110 33 Q118 26 128 34" stroke="#f0f0f0" stroke-width="2" fill="none"/>
  </svg>`;
  if (type==='ghost') return `<svg viewBox="0 0 180 140" xmlns="http://www.w3.org/2000/svg" style="max-width:130px;">
    <path d="M50 125 Q50 58 90 48 Q130 58 130 125 Q120 112 110 122 Q100 112 90 122 Q80 112 70 122 Q60 112 50 125Z" fill="#111" stroke="#f0f0f0" stroke-width="2"/>
    <circle cx="75" cy="88" r="9" fill="#f0f0f0"/>
    <circle cx="105" cy="88" r="9" fill="#f0f0f0"/>
    <circle cx="78" cy="85" r="4" fill="#111"/>
    <circle cx="108" cy="85" r="4" fill="#111"/>
    <path d="M78 108 Q90 115 102 108" stroke="#f0f0f0" stroke-width="2" fill="none"/>
  </svg>`;
  if (type==='bus') return `<svg viewBox="0 0 200 110" xmlns="http://www.w3.org/2000/svg" style="max-width:180px;">
    <rect x="15" y="18" width="170" height="65" rx="12" fill="#111" stroke="#f0f0f0" stroke-width="2"/>
    <rect x="25" y="28" width="28" height="22" rx="3" fill="none" stroke="#f0f0f0" stroke-width="1.5"/>
    <rect x="62" y="28" width="28" height="22" rx="3" fill="none" stroke="#f0f0f0" stroke-width="1.5"/>
    <rect x="99" y="28" width="28" height="22" rx="3" fill="none" stroke="#f0f0f0" stroke-width="1.5"/>
    <rect x="136" y="28" width="28" height="22" rx="3" fill="none" stroke="#f0f0f0" stroke-width="1.5"/>
    <circle cx="50" cy="93" r="12" fill="#111" stroke="#f0f0f0" stroke-width="2"/>
    <circle cx="150" cy="93" r="12" fill="#111" stroke="#f0f0f0" stroke-width="2"/>
    <circle cx="50" cy="93" r="5" fill="#f0f0f0"/>
    <circle cx="150" cy="93" r="5" fill="#f0f0f0"/>
  </svg>`;
  if (type==='zzz') return `<svg viewBox="0 0 180 100" xmlns="http://www.w3.org/2000/svg" style="max-width:140px;">
    <text x="30" y="70" font-size="48" fill="#f0f0f0" font-family="Georgia" opacity="0.9">z</text>
    <text x="75" y="55" font-size="34" fill="#f0f0f0" font-family="Georgia" opacity="0.6">z</text>
    <text x="112" y="40" font-size="22" fill="#f0f0f0" font-family="Georgia" opacity="0.35">z</text>
  </svg>`;
  return '';
}

renderStoryList();
</script>
</body>
</html>
