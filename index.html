<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Take Me Somewhere Else — The Bus</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111; color:#f0f0f0; font-family: Georgia, 'Times New Roman', serif; min-height:100vh; display:flex; align-items:flex-start; justify-content:center; padding: 2rem 1rem; }
#app { width:100%; max-width:480px; }
#screen-title { text-align:center; padding: 3rem 1rem 2rem; }
#screen-title h1 { font-size: 24px; font-weight: 400; letter-spacing: 4px; color:#f0f0f0; text-transform:uppercase; margin-bottom:10px; }
#screen-title .sub { font-size:12px; color:#666; letter-spacing:3px; font-family:monospace; margin-bottom:3rem; }
.story-card { background:#1a1a1a; border:1px solid #2a2a2a; border-radius:10px; padding:1.25rem; margin-bottom:12px; cursor:pointer; transition: border-color 0.2s, background 0.2s; }
.story-card:hover { background:#222; border-color:#444; }
.story-card h3 { font-size:17px; font-weight:400; color:#f0f0f0; margin-bottom:5px; }
.story-card p { font-size:13px; color:#666; font-family:monospace; }
.story-card.locked { opacity:0.3; cursor:not-allowed; pointer-events:none; }
.coming-soon { font-size:11px; color:#444; font-family:monospace; letter-spacing:2px; text-align:center; margin-top:2rem; }
#screen-story, #screen-end { display:none; }
#story-header { display:flex; align-items:center; gap:12px; margin-bottom:2rem; }
#back-btn { background:none; border:none; color:#555; cursor:pointer; font-family:monospace; font-size:12px; letter-spacing:1px; text-transform:uppercase; padding:0; }
#back-btn:hover { color:#aaa; }
#story-name { font-family:monospace; font-size:11px; letter-spacing:3px; color:#444; text-transform:uppercase; }
#story-image { text-align:center; margin:1.5rem 0 1rem; min-height:10px; }
#story-image svg { max-width:160px; }
#story-text { font-size:17px; line-height:1.85; color:#e0e0e0; margin-bottom:2rem; white-space: pre-line; }
#choices { display:flex; flex-direction:column; gap:10px; margin-bottom:2rem; }
.choice-btn { background:#1a1a1a; border:1px solid #2a2a2a; border-radius:8px; padding:14px 18px; text-align:left; cursor:pointer; font-size:15px; font-family:Georgia, serif; color:#ddd; line-height:1.5; transition: background 0.2s, border-color 0.2s; }
.choice-btn:hover { background:#222; border-color:#555; }
.choice-btn:active { transform:scale(0.99); }
.choice-btn.locked { opacity:0.3; cursor:not-allowed; border-style: dashed; }
.choice-btn.locked:hover { background:#1a1a1a; border-color:#2a2a2a; }
#progress { font-family:monospace; font-size:11px; color:#333; letter-spacing:1px; text-align:right; margin-bottom:1rem; }
#screen-end { text-align:left; }
#end-tag { font-family:monospace; font-size:11px; letter-spacing:3px; color:#444; text-transform:uppercase; margin-bottom:1.5rem; text-align:center; }
#end-image { text-align:center; margin:1rem 0 1.5rem; }
#end-text { font-size:17px; line-height:1.85; color:#e0e0e0; margin-bottom:2.5rem; white-space: pre-line; }
.end-btns { display:flex; gap:10px; flex-wrap:wrap; }
.end-btn { font-family:monospace; font-size:12px; letter-spacing:2px; color:#888; background:none; border:1px solid #2a2a2a; border-radius:8px; padding:10px 20px; cursor:pointer; text-transform:uppercase; }
.end-btn:hover { border-color:#555; color:#ccc; }
.fade { animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>
<div id="app">

  <div id="screen-title">
    <h1>Take me somewhere else</h1>
    <div class="sub">choose your adventure</div>
    <div id="story-list"></div>
    <div class="coming-soon">more stories coming soon</div>
  </div>

  <div id="screen-story">
    <div id="story-header">
      <button id="back-btn" onclick="goHome()">← stories</button>
      <div id="story-name"></div>
    </div>
    <div id="progress"></div>
    <div id="story-image"></div>
    <div id="story-text"></div>
    <div id="choices"></div>
  </div>

  <div id="screen-end">
    <div id="end-tag">the end</div>
    <div id="end-image"></div>
    <div id="end-text"></div>
    <div class="end-btns">
      <button class="end-btn" onclick="restartStory()">play again</button>
      <button class="end-btn" onclick="goHome()">other stories</button>
    </div>
  </div>

</div>

<script>
const STORIES = [
  {
    id: "bus",
    title: "The Bus",
    tagline: "a perfectly ordinary commute",
    locked: false,
    start: "opening",
    nodes: {

      opening: {
        text: "You had a crappy day and your feet hurt and your boss said something passive-aggressive about your report. Again. You drag yourself onto the 6:15 bus and survey your options.",
        choices: [
          { label: "By the window — lean against it, breathe", goes_to: "window" },
          { label: "Back of the bus — full view of everyone", goes_to: "back_of_bus", locked: true }
        ]
      },

      // ─── PATH A: WINDOW SEAT ───────────────────────────────────────

      window: {
        text: "Good choice. The city slides by in streaks of orange light. Your eyes get heavy. The hum of the engine is practically a lullaby. You think: just five minutes. Five minutes won't hurt.",
        choices: [
          { label: "Close your eyes. Just for a second.", goes_to: "asleep" },
          { label: "Stay alert — your friend Morty got mugged on a bus last week.", goes_to: "morty", locked: true }
        ]
      },

      asleep: {
        text: "You are OUT. Deeply, embarrassingly asleep. Your mouth might be open. The bus jerks to a sudden stop and you startle awake, straightening your jacket with the dignity of someone who was definitely not just drooling.",
        image: "panic",
        choices: [
          { label: "Check your pockets. Just in case.", goes_to: "check_pockets" },
          { label: "Straighten up and try to look normal.", goes_to: "look_normal", locked: true }
        ]
      },

      check_pockets: {
        text: "Your hand hits your pocket. Then your other pocket. Then your jacket. Then all your pockets again in a panic spiral. Your wallet is gone. GONE. Cash, cards, your library card from 2019 — all gone.",
        image: "panic",
        choices: [
          { label: "Look around frantically for the thief.", goes_to: "look_around", locked: true },
          { label: "Check under the seat. Please be under the seat.", goes_to: "under_seat" }
        ]
      },

      under_seat: {
        text: "You get down on the floor of the bus. The floor of a public bus. In your work clothes. Your wallet is not there. A gum wrapper is. And something unidentifiable. But no wallet.",
        choices: [
          { label: "Stand up and stare intensely at the people sitting closest to you.", goes_to: "stare_down" },
          { label: "Sit back quietly and try to keep a calm face.", goes_to: "calm_face", locked: true }
        ]
      },

      stare_down: {
        text: "You scan every face on the bus with the energy of a conspiracy theorist. Nobody looks guilty. Everybody looks guilty. Then you notice — the guy two seats ahead is holding a wallet. A brown wallet. YOUR brown wallet.",
        choices: [
          { label: "Confront him loudly.", goes_to: "confront_loud", locked: true },
          { label: "Sit closer to investigate quietly.", goes_to: "sit_closer" }
        ]
      },

      sit_closer: {
        text: "You stare at the wallet he's holding, trying really hard to confirm it's yours before confronting him. One second you're certain it's yours, the next you have doubts.",
        choices: [
          { label: "Say quietly: 'Excuse me, is that your wallet?'", goes_to: "ask_quietly", locked: true },
          { label: "Take out your phone and zoom in to take a picture.", goes_to: "zoom_photo" }
        ]
      },

      zoom_photo: {
        text: "You are about to take a close-up picture of the wallet when your phone rings. It's your mom.",
        choices: [
          { label: "Answer it.", goes_to: "answer_mom" },
          { label: "Ignore it.", goes_to: "ignore_mom", locked: true }
        ]
      },

      answer_mom: {
        text: "Your mom is talking up a storm about a new book she picked up. You hunch down, whispering that it's not a good time. She can barely hear you and keeps talking. You finally say a bit louder 'I'll call you back, ok?' and hang up.\n\nIn that short time the bus made a stop. The man with the wallet is gone.",
        choices: [
          { label: "Yell at the driver to stop the bus!", goes_to: "yell_driver", locked: true },
          { label: "Freeze. Your face shows everything.", goes_to: "freeze" }
        ]
      },

      freeze: {
        text: "As you sit there contemplating your life choices, your eyes land on a new passenger who just boarded. They're putting away a wallet as they find their seat. It also kind of looks like yours.\n\nYou sit up and —",
        choices: [
          { label: "Look around the bus like you are questioning reality.", goes_to: "question_reality", locked: true },
          { label: "Check your pockets one more time.", goes_to: "wallet_back" }
        ]
      },

      wallet_back: {
        text: "You check your pockets and — to your complete disbelief — the wallet is there. WHAT IN THE WORLD IS HAPPENING? You take it out. Inspect it. Looks fine. You put it back, sit up, let out a long sigh while rubbing your forehead.\n\nAs your eyes focus back on the road you realize you don't recognize the street. You reach for your phone. It's dead.",
        choices: [
          { label: "Get up and ask the driver where you are.", goes_to: "ask_driver", locked: true },
          { label: "Ask the passenger in front of you about the next stop.", goes_to: "tap_passenger" }
        ]
      },

      tap_passenger: {
        text: "You tap them gently on the shoulder. 'Excuse me, do you know what the next station is?'\n\nThey don't react. You try again, a little harder.\n\nYou let out a loud shriek as you watch their head fall off and roll down the aisle all the way to the front of the bus, stopping next to the driver — who acts completely clueless. Nobody else reacts. As you look around you realize the other passengers look like mannequins.",
        image: "panic",
        choices: [
          { label: "Go full panic mode.", goes_to: "panic_mode", locked: true },
          { label: "Start laughing and knock off all the mannequin heads.", goes_to: "knock_heads" }
        ]
      },

      knock_heads: {
        text: "You give into the chaos completely. One by one. Pop. Pop. Pop.\n\nThen one of the heads on the floor starts talking. 'I'm hungry for some toes... yum yum yum!' The other heads join in, all rolling toward you. You jump onto a seat as they close in and scream:\n\n'DON'T EAT MY TOES, YOU PLASTIC MONSTERS!'\n\nThe bus jerks hard. The world goes dark.",
        image: "panic",
        choices: [
          { label: "You hear laughter all around.", goes_to: "ending_a1" },
          { label: "You hear a voice say 'are you ok?'", goes_to: "ending_a2", locked: true }
        ]
      },

      ending_a1: {
        text: "You open your eyes. The passengers are laughing — some to themselves, some together. A group of teenagers holds up a phone, replaying a video of you screaming 'DON'T EAT MY TOES, YOU PLASTIC MONSTERS!'\n\nYou realize what happened. You stand up slowly. And take a bow.\n\nThe bus applauds.\n\nYour stop is coming up. You sit down and reach for your phone — a few texts, a missed call from mom. She left a voicemail.\n\n'Hi honey, it's mom. Call me back when you get home, ok? And watch those toes!'\n\nShe laughs. Loud.",
        is_ending: true,
        ending_type: "twist"
      },

      // ─── PATH A ALTERNATE ENDING (locked) ─────────────────────────
      ending_a2: {
        text: "[ coming soon ]",
        is_ending: true,
        ending_type: "good",
        locked: true
      },

      // ─── PATH B: BACK OF BUS (all locked) ─────────────────────────
      back_of_bus: {
        text: "[ coming soon ]",
        locked: true,
        choices: [
          { label: "[ coming soon ]", goes_to: "back_of_bus", locked: true },
          { label: "[ coming soon ]", goes_to: "back_of_bus", locked: true }
        ]
      },

      // ─── LOCKED BRANCHES (placeholders) ───────────────────────────
      morty:          { text:"[ coming soon ]", locked:true, choices:[] },
      look_normal:    { text:"[ coming soon ]", locked:true, choices:[] },
      look_around:    { text:"[ coming soon ]", locked:true, choices:[] },
      calm_face:      { text:"[ coming soon ]", locked:true, choices:[] },
      confront_loud:  { text:"[ coming soon ]", locked:true, choices:[] },
      ask_quietly:    { text:"[ coming soon ]", locked:true, choices:[] },
      ignore_mom:     { text:"[ coming soon ]", locked:true, choices:[] },
      yell_driver:    { text:"[ coming soon ]", locked:true, choices:[] },
      question_reality:{ text:"[ coming soon ]", locked:true, choices:[] },
      ask_driver:     { text:"[ coming soon ]", locked:true, choices:[] },
      panic_mode:     { text:"[ coming soon ]", locked:true, choices:[] },
    }
  },
  {
    id: "story2",
    title: "Coming Soon",
    tagline: "another weird little adventure",
    locked: true
  }
];

let currentStory = null;
let currentNode = null;
let stepCount = 0;

function goHome() {
  document.getElementById('screen-title').style.display='block';
  document.getElementById('screen-story').style.display='none';
  document.getElementById('screen-end').style.display='none';
}
function show(id) { document.getElementById(id).style.display='block'; }
function hide(id) { document.getElementById(id).style.display='none'; }

function renderStoryList() {
  document.getElementById('story-list').innerHTML = STORIES.map(s =>
    `<div class="story-card${s.locked ? ' locked' : ''}" ${!s.locked ? `onclick="startStory('${s.id}')"` : ''}>
      <h3>${s.title}</h3>
      <p>${s.tagline}</p>
    </div>`
  ).join('');
}

function startStory(id) {
  currentStory = STORIES.find(s => s.id === id);
  if (!currentStory || currentStory.locked) return;
  currentNode = currentStory.start;
  stepCount = 0;
  goHome();
  hide('screen-title');
  show('screen-story');
  document.getElementById('story-name').textContent = currentStory.title.toUpperCase();
  renderNode();
}

function restartStory() {
  currentNode = currentStory.start;
  stepCount = 0;
  hide('screen-end');
  show('screen-story');
  renderNode();
}

function renderNode() {
  const node = currentStory.nodes[currentNode];
  if (!node) return;

  if (node.is_ending) {
    hide('screen-story');
    show('screen-end');
    const endText = document.getElementById('end-text');
    endText.textContent = node.text;
    endText.className = 'fade';
    document.getElementById('end-image').innerHTML = '';
    return;
  }

  stepCount++;
  document.getElementById('progress').textContent = 'step ' + stepCount;

  const textEl = document.getElementById('story-text');
  textEl.textContent = node.text;
  textEl.className = 'fade';

  document.getElementById('story-image').innerHTML = node.image ? getSVG(node.image) : '';

  document.getElementById('choices').innerHTML = (node.choices || []).map((c, i) =>
    `<button class="choice-btn${c.locked ? ' locked' : ''}" ${!c.locked ? `onclick="choose(${i})"` : 'disabled'}>
      ${c.locked ? '[ coming soon ]' : c.label}
    </button>`
  ).join('');
}

function choose(i) {
  const node = currentStory.nodes[currentNode];
  const choice = node.choices[i];
  if (choice.locked) return;
  currentNode = choice.goes_to;
  window.scrollTo({top:0, behavior:'smooth'});
  renderNode();
}

function getSVG(type) {
  if (type==='panic') return `<svg viewBox="0 0 180 120" xmlns="http://www.w3.org/2000/svg" style="max-width:150px;">
    <circle cx="90" cy="60" r="50" fill="none" stroke="#f0f0f0" stroke-width="2"/>
    <ellipse cx="68" cy="52" rx="16" ry="20" fill="#111" stroke="#f0f0f0" stroke-width="2"/>
    <ellipse cx="112" cy="52" rx="16" ry="20" fill="#111" stroke="#f0f0f0" stroke-width="2"/>
    <circle cx="68" cy="54" r="9" fill="#f0f0f0"/>
    <circle cx="112" cy="54" r="9" fill="#f0f0f0"/>
    <circle cx="71" cy="51" r="3.5" fill="#111"/>
    <circle cx="115" cy="51" r="3.5" fill="#111"/>
    <path d="M68 85 Q90 78 112 85" stroke="#f0f0f0" stroke-width="2" fill="none"/>
    <path d="M52 34 Q62 26 70 33" stroke="#f0f0f0" stroke-width="2" fill="none"/>
    <path d="M110 33 Q118 26 128 34" stroke="#f0f0f0" stroke-width="2" fill="none"/>
  </svg>`;
  return '';
}

renderStoryList();
</script>
</body>
</html>
