<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Take Me Somewhere Else</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111; color:#f0f0f0; font-family: Georgia, 'Times New Roman', serif; min-height:100vh; display:flex; align-items:flex-start; justify-content:center; padding: 2rem 1rem; }
#app { width:100%; max-width:480px; }
#screen-title { text-align:center; padding: 3rem 1rem 2rem; }
#screen-title h1 { font-size: 24px; font-weight: 400; letter-spacing: 4px; color:#f0f0f0; text-transform:uppercase; margin-bottom:10px; }
#screen-title .sub { font-size:12px; color:#666; letter-spacing:3px; font-family:monospace; margin-bottom:3rem; }
.story-card { background:#1a1a1a; border:1px solid #2a2a2a; border-radius:10px; padding:1.25rem; margin-bottom:12px; cursor:pointer; transition: border-color 0.2s, background 0.2s; }
.story-card:hover { background:#222; border-color:#444; }
.story-card h3 { font-size:17px; font-weight:400; color:#f0f0f0; margin-bottom:5px; }
.story-card p { font-size:13px; color:#666; font-family:monospace; }
.story-card.locked { opacity:0.3; cursor:not-allowed; pointer-events:none; }
.coming-soon { font-size:11px; color:#333; font-family:monospace; letter-spacing:2px; text-align:center; margin-top:2rem; }
#screen-story, #screen-end { display:none; }
#story-header { display:flex; align-items:center; gap:12px; margin-bottom:2rem; }
#back-btn { background:none; border:none; color:#555; cursor:pointer; font-family:monospace; font-size:12px; letter-spacing:1px; text-transform:uppercase; padding:0; }
#back-btn:hover { color:#aaa; }
#story-name { font-family:monospace; font-size:11px; letter-spacing:3px; color:#444; text-transform:uppercase; }
#story-image { text-align:center; margin:1rem 0; }
#story-text { font-size:17px; line-height:1.88; color:#e0e0e0; margin-bottom:2rem; white-space:pre-line; }
#choices { display:flex; flex-direction:column; gap:10px; margin-bottom:2rem; }
.choice-btn { background:#1a1a1a; border:1px solid #2a2a2a; border-radius:8px; padding:14px 18px; text-align:left; cursor:pointer; font-size:15px; font-family:Georgia, serif; color:#ddd; line-height:1.5; transition: background 0.2s, border-color 0.2s; }
.choice-btn:hover { background:#222; border-color:#555; }
.choice-btn:active { transform:scale(0.99); }
.continue-btn { background:none; border:none; color:#444; font-family:monospace; font-size:14px; letter-spacing:4px; cursor:pointer; padding:12px 0; display:block; margin:0 auto; transition: color 0.2s; }
.continue-btn:hover { color:#888; }
#screen-end { text-align:left; }
#end-tag { font-family:monospace; font-size:11px; letter-spacing:3px; color:#444; text-transform:uppercase; margin-bottom:1.5rem; text-align:center; }
#end-image { text-align:center; margin:1rem 0 1.5rem; }
#end-text { font-size:17px; line-height:1.88; color:#e0e0e0; margin-bottom:2.5rem; white-space:pre-line; }
.end-btns { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top:1rem; }
.end-btn { font-family:monospace; font-size:12px; letter-spacing:2px; color:#888; background:none; border:1px solid #2a2a2a; border-radius:8px; padding:10px 20px; cursor:pointer; text-transform:uppercase; }
.end-btn:hover { border-color:#555; color:#ccc; }
.fade { animation: fadeIn 0.5s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>
<div id="app">
  <div id="screen-title">
    <h1>Take me somewhere else</h1>
    <div class="sub">choose your adventure</div>
    <div id="story-list"></div>
    <div class="coming-soon">more stories coming soon</div>
  </div>
  <div id="screen-story">
    <div id="story-header">
      <button id="back-btn" onclick="goHome()">← stories</button>
      <div id="story-name"></div>
    </div>
    <div id="story-image"></div>
    <div id="story-text"></div>
    <div id="choices"></div>
  </div>
  <div id="screen-end">
    <div id="end-tag">the end</div>
    <div id="end-image"></div>
    <div id="end-text"></div>
    <div class="end-btns">
      <button class="end-btn" onclick="restartStory()">play again</button>
      <button class="end-btn" onclick="goHome()">other stories</button>
    </div>
  </div>
</div>

<script>
const STORIES = [
  {
    id: "bus",
    title: "The Bus",
    tagline: "a perfectly ordinary commute",
    locked: false,
    start: "opening",
    nodes: {

      opening: {
        text: "You had a crappy day and your feet hurt and your boss said something passive-aggressive about your report. Again.\n\nYou can't wait to get home and relax.\n\nYou drag yourself onto the 6:15 bus and survey your options.",
        choices: [
          { label: "By the window — lean against it, breathe", goes_to: "window" },
          { label: "Back of the bus — full view of everyone", goes_to: "back_coming_soon" }
        ]
      },

      back_coming_soon: {
        text: "[ this story is coming soon ]",
        is_ending: true
      },

      window: {
        text: "Good choice.\n\nThe city slides by in streaks of orange light. Your eyes get heavy. The hum of the engine is practically a lullaby and your body, the absolute traitor that it is, starts shutting down one system at a time.\n\nJust five minutes. Five minutes won't hurt.\n\nFive minutes never hurt anyone.",
        choices: [{ label: "...", goes_to: "asleep" }]
      },

      asleep: {
        text: "You are out.\n\nDeeply, completely, mouth-possibly-open asleep.\n\nThe bus jerks to a sudden stop and you snap back to reality, grabbing the seat in front of you like it personally owes you something. You sit up. Straighten your jacket. Run a hand through your hair.\n\nVery smooth. Nobody saw that.\n\nThen it hits you.\n\nDamn it. You did not mean to fall asleep. Morty got mugged last week on this exact line. Lost his wallet AND his good headphones. His GOOD ones.",
        image: "panic",
        choices: [{ label: "...", goes_to: "check_pockets" }]
      },

      check_pockets: {
        text: "You do a casual pocket check. Just a normal, relaxed, totally-not-panicking tap of your jacket.\n\nNothing.\n\nOk. Other pocket. Also nothing. Inside pocket. Nothing. Back pocket — wait, you never put it there. Front again. Other front. Jacket again, but slower this time, more thorough, more desperate.\n\nYour wallet is gone.\n\nGONE.\n\nCash. Cards. Your library card from 2019 that you keep meaning to use. Gone.",
        image: "panic",
        choices: [{ label: "...", goes_to: "under_seat" }]
      },

      under_seat: {
        text: "Ok. Ok ok ok. Maybe it fell.\n\nYou lean forward and reach under the seat, arm disappearing into the abyss, fingers sweeping across the floor with the grim determination of someone who has fully committed to this and is not going to think too hard about what they might be touching.\n\nSomething sticky. A plastic straw. What feels like a single forgotten french fry.\n\nNo wallet.\n\nYou sit back up and wipe your hand on your pants with a slow, dignified grimace.\n\nAlright. New strategy. You scan the bus.",
        choices: [{ label: "...", goes_to: "spot_wallet" }]
      },

      spot_wallet: {
        text: "There.\n\nTwo seats ahead, a man is holding a wallet, turning it over in his hands like he's inspecting it.\n\nBrown. Worn at the corners. Little scuff mark on the left side.\n\nYours is brown. Worn at the corners. Little scuff mark on the — wait.\n\nIs that yours? That's yours. That's definitely yours. Actually, wait. Is it? It could just be a similar wallet. Lots of people have brown wallets. That could be anyone's brown wallet. But the scuff mark though. THAT scuff mark.\n\nYou need a closer look.",
        choices: [{ label: "...", goes_to: "zoom_attempt" }]
      },

      zoom_attempt: {
        text: "You raise your phone slowly, like a wildlife photographer who has finally spotted their subject and absolutely cannot spook it.\n\nZoom. A little more. A little more.\n\nYou are crouched slightly in your seat, one eye squinted, tongue possibly sticking out in concentration.\n\nYou get the feeling you are not pulling this off as smoothly as you'd hoped.\n\nYour phone rings.\n\nOf course it does.\n\nIt's your mom.",
        choices: [{ label: "...", goes_to: "mom_call" }]
      },

      mom_call: {
        text: "You answer and immediately hunch forward, hand cupped around your mouth.\n\n'Mom. Hi. Now is actually not a great—'\n\n'So you know Karen from my book club?' she begins.\n\nYou did not know that Karen was going to be involved in this.\n\n'Mom, I'm on the bus, it's really not a good—'\n\n'She told me about chia seeds. For hair. Now before you say anything—'\n\n'Mom—'\n\n'Just listen.'",
        choices: [{ label: "...", goes_to: "mom_chia" }]
      },

      mom_chia: {
        text: "She found an article. Of course she found an article.\n\n'It says here — and I'm reading directly — that chia seeds contain omega-3 fatty acids, zinc, and protein, all of which are known to support hair follicle health and stimulate growth from the root.'\n\nA pause for effect.\n\n'From the ROOT.'\n\nYou catch your own reflection in the dark window. You turn your head slightly. Tilt it the other way. Actually, is it looking a little thin up top? You run a hand through it slowly, still listening, and now you're kind of inspecting it, mouth slightly open, genuinely assessing the situation your mom has just introduced.",
        choices: [{ label: "...", goes_to: "mom_reading" }]
      },

      mom_reading: {
        text: "'Now it also says you can add them to smoothies, yogurt, overnight oats—'\n\n'Mom.'\n\n'—or just water, they expand in water, which is actually very good for—'\n\n'MOM.'\n\n'I'm just saying! Karen's nephew tried it and his hairline came back. His whole hairline. Like it just showed back up one day like nothing happened.'\n\nYou are still looking at your reflection. You part your hair slightly to the left.\n\nHuh.\n\n'Ok mom I really have to go, I'll call you back, talk soon bye.'\n\nYou hang up. The bus shuffles. People getting on, people getting off, the usual rearranging of strangers.\n\nWhen the movement settles, you glance up.\n\nThe seat ahead is empty. The man with the wallet is gone.",
        choices: [{ label: "...", goes_to: "new_passenger" }]
      },

      new_passenger: {
        text: "In the same shuffle, someone new has taken a seat a few rows up — coat, work bag, the face of a person who also had a day.\n\nThey reach into their coat and tuck something into their inside pocket.\n\nA wallet.\n\nBrown.\n\nWorn at the corners.\n\nYou close your eyes for exactly one second.\n\nThen you reach slowly into your own jacket pocket.\n\nAll the way in.",
        choices: [{ label: "...", goes_to: "wallet_found" }]
      },

      wallet_found: {
        text: "It's there.\n\nYour wallet. Right where it has always been, right where you have kept it for the last four years, exactly where you put it this morning.\n\nYou pull it out and stare at it.\n\nOk. Ok so. Your brain is clearly just fried. Absolutely cooked. This is what happens when you work too much and sleep too little and eat lunch at your desk for the fourteenth day in a row. You need to do something fun this weekend. Something that isn't this.\n\nYou put the wallet back and look out the window, already trying to think of plans. Maybe that place your friend recommended. Or just a long walk somewhere new. Or you could finally—\n\nYou stop.\n\nYou don't recognize the street.",
        choices: [{ label: "...", goes_to: "strange_street" }]
      },

      strange_street: {
        text: "You press closer to the glass.\n\nThe sidewalks are empty. No one walking. Not a single person out there, just a street full of nothing moving.\n\nThe shop signs are all lit up in red — only red — and from this distance you can't quite read them. You squint.\n\nThere's an ice cream parlor on the corner. You think you know that place. You've definitely been to that corner before. But the sign says:\n\nTONNY'S ICE POOPS\n\nYou blink.\n\nIt still says that.\n\nYou reach for your phone.",
        choices: [{ label: "...", goes_to: "dead_phone" }]
      },

      dead_phone: {
        text: "Dead.\n\nOf course it is.\n\nYou look back out the window. The red signs blur past. Still no one on the street. The bus feels like it's moving through somewhere that forgot to finish being a place.\n\nThe passenger in the seat ahead of you might know where you are.",
        choices: [
          { label: "Tap them on the shoulder.", goes_to: "head_falls" },
          { label: "Gently shake their shoulder.", goes_to: "head_falls" }
        ]
      },

      head_falls: {
        text: "'Excuse me — sorry to bother you, do you know what the next stop is?'\n\nNothing.\n\nYou try again, a little more insistent this time.\n\nWhat happens next will stay with you.\n\nTheir head separates from their body with a sound like a cabinet closing, rolls down the aisle in a slow unhurried arc, and comes to rest against the driver's partition.\n\nThe driver does not react.\n\nYou look left. You look right.\n\nEvery single passenger on this bus is a mannequin. All of them. Perfectly still. Perfectly dressed. Staring at nothing with their beautiful painted eyes.",
        image: "panic",
        choices: [{ label: "...", goes_to: "slap_moment" }]
      },

      slap_moment: {
        text: "You sit with this for a moment.\n\nThen you slap yourself across the face.\n\nNothing happens. The mannequins remain. The head is still on the floor.\n\nYou slap yourself again, harder this time, with more intention.\n\nStill nothing. The bus hums along through the empty red street like this is completely normal.\n\nYou stand up.",
        choices: [{ label: "...", goes_to: "bus_jerks" }]
      },

      bus_jerks: {
        text: "The bus takes a sharp turn.\n\nThen another.\n\nIt lurches hard and the mannequins, every single one of them, tip and slide and collapse. Arms clatter to the floor. Torsos slump. Heads roll in every direction, bouncing off seats and each other, filling the aisle with a slow chaos of hollow plastic parts.\n\nYou grab the rail above you and hold on, watching it all happen around you — legs here, an arm there, a head spinning lazily past your foot.\n\nIt looks like a factory exploded.\n\nIt sounds like one too.",
        image: "panic",
        choices: [{ label: "...", goes_to: "head_speaks" }]
      },

      head_speaks: {
        text: "One of the heads rolls to a stop right at your feet.\n\nYou look at it.\n\nIt looks at you.\n\nYou kick it away.\n\nIt rolls back a few feet, slows, and stops.\n\nAnd then it speaks.\n\n'I'm hungry for some toes... yum yum yum.'\n\nAnother one picks it up.\n\nAnd another.\n\nAll of them now — rolling back toward you, a slow tide of hollow plastic heads with one very specific agenda.",
        image: "panic",
        choices: [{ label: "...", goes_to: "toes_scream" }]
      },

      toes_scream: {
        text: "You climb onto the nearest seat and grab the overhead rail with both hands, feet as far off the floor as possible.\n\nThey keep coming.\n\nAll of them.\n\n'DON'T EAT MY TOES, YOU PLASTIC MONSTERS!'\n\nThe bus jerks.\n\nHard.\n\nThe world goes dark.",
        image: "panic",
        choices: [{ label: "...", goes_to: "wake_up" }]
      },

      wake_up: {
        text: "You open your eyes.\n\nThe bus. Your seat. The city outside the window, normal and lit and full of people walking around doing normal things.\n\nAll the passengers — real, human, very much present — are looking at you.\n\nA few are openly laughing. A group of teenagers near the back has a phone pointed at you. You can hear yourself, tinny through the speaker:\n\n'DON'T EAT MY TOES, YOU PLASTIC MONSTERS!'\n\nA woman with a tote bag is pressing her lips together very hard.\n\nThe driver is looking at you in the mirror.\n\nYou were asleep. You were absolutely just asleep on this bus.",
        image: "panic",
        choices: [
          { label: "Stand up and take a bow.", goes_to: "bow_ending" },
          { label: "Get off at the next stop. Right now.", goes_to: "escape_ending" }
        ]
      },

      bow_ending: {
        text: "You make a decision.\n\nYou stand up.\n\nYou smooth your jacket with both hands.\n\nAnd you take a slow, unhurried bow — one hand behind your back, the full thing, committed.\n\nThe bus loses it.\n\nActual applause. The teenagers are losing their minds. The tote bag woman finally lets herself laugh. Even the driver shakes his head with what might be respect.\n\nYour stop is next. You get off into the cool night air, the noise fading behind you as the doors close.\n\nYou walk home.\n\nYou get inside. Kick off your shoes. Check your phone — it somehow has charge again.\n\nMissed call from mom. Voicemail.",
        choices: [{ label: "...", goes_to: "voicemail_end" }]
      },

      escape_ending: {
        text: "Absolutely not.\n\nThe next stop — you are up, bag in hand, moving to the door before the bus has fully stopped, stepping off into the night without making eye contact with a single human being.\n\nYou walk fast. Then faster. The laughter from the bus fades half a block back and you do not look behind you, not once, not even a little.\n\nBy the fourth block something releases in your chest and you let out a single short laugh at absolutely nothing.\n\nYou get home. Kick your shoes off. Pour a glass of water.\n\nIt was a dream. Obviously just a dream.\n\nYou check your phone. Missed call from mom. Voicemail.",
        choices: [{ label: "...", goes_to: "voicemail_end" }]
      },

      voicemail_end: {
        text: "You press play.\n\n'Hi honey, it's mom. Just checking in. I haven't heard from you in a few days, just wanted to make sure you were ok. Call me back when you get a chance.'\n\nA pause. The faint sound of the TV in the background.\n\nThen, quieter. Almost as an afterthought.\n\n'Oh and honey —'\n\nA shorter pause.\n\n'Still got all your toes?'\n\nShe laughs once — small, private, like she told herself a joke — and hangs up.\n\nNo explanation.\n\nJust the toes.\n\nYou stand in your hallway for a long time.",
        is_ending: true
      }

    }
  },
  {
    id: "story2",
    title: "Coming Soon",
    tagline: "another weird little adventure",
    locked: true
  }
];

let currentStory = null;
let currentNode = null;

function goHome() {
  document.getElementById('screen-title').style.display = 'block';
  document.getElementById('screen-story').style.display = 'none';
  document.getElementById('screen-end').style.display = 'none';
}
function show(id) { document.getElementById(id).style.display = 'block'; }
function hide(id) { document.getElementById(id).style.display = 'none'; }

function renderStoryList() {
  document.getElementById('story-list').innerHTML = STORIES.map(s =>
    `<div class="story-card${s.locked?' locked':''}" ${!s.locked?`onclick="startStory('${s.id}')"`:''}><h3>${s.title}</h3><p>${s.tagline}</p></div>`
  ).join('');
}

function startStory(id) {
  currentStory = STORIES.find(s => s.id === id);
  if (!currentStory || currentStory.locked) return;
  currentNode = currentStory.start;
  hide('screen-title'); hide('screen-end'); show('screen-story');
  document.getElementById('story-name').textContent = currentStory.title.toUpperCase();
  renderNode();
}

function restartStory() {
  currentNode = currentStory.start;
  hide('screen-end'); show('screen-story');
  renderNode();
}

function renderNode() {
  const node = currentStory.nodes[currentNode];
  if (!node) return;

  if (node.is_ending) {
    hide('screen-story'); show('screen-end');
    const et = document.getElementById('end-text');
    et.textContent = node.text;
    et.className = 'fade';
    document.getElementById('end-image').innerHTML = node.image ? getSVG(node.image) : '';
    return;
  }

  const textEl = document.getElementById('story-text');
  textEl.textContent = node.text;
  textEl.className = 'fade';
  document.getElementById('story-image').innerHTML = node.image ? getSVG(node.image) : '';

  const choicesEl = document.getElementById('choices');
  const isContinue = node.choices && node.choices.length === 1 && node.choices[0].label === '...';
  if (isContinue) {
    choicesEl.innerHTML = `<button class="continue-btn" onclick="choose(0)">· · ·</button>`;
  } else {
    choicesEl.innerHTML = (node.choices || []).map((c, i) =>
      `<button class="choice-btn" onclick="choose(${i})">${c.label}</button>`
    ).join('');
  }
}

function choose(i) {
  const node = currentStory.nodes[currentNode];
  currentNode = node.choices[i].goes_to;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  renderNode();
}

function getSVG(type) {
  if (type === 'panic') return `<svg viewBox="0 0 180 120" xmlns="http://www.w3.org/2000/svg" style="max-width:140px;margin:0.5rem auto;display:block;">
    <circle cx="90" cy="60" r="50" fill="none" stroke="#f0f0f0" stroke-width="2"/>
    <ellipse cx="68" cy="50" rx="16" ry="20" fill="#111" stroke="#f0f0f0" stroke-width="2"/>
    <ellipse cx="112" cy="50" rx="16" ry="20" fill="#111" stroke="#f0f0f0" stroke-width="2"/>
    <circle cx="68" cy="52" r="10" fill="#f0f0f0"/>
    <circle cx="112" cy="52" r="10" fill="#f0f0f0"/>
    <circle cx="71" cy="49" r="4" fill="#111"/>
    <circle cx="115" cy="49" r="4" fill="#111"/><path d="M70 82 Q90 76 110 82" stroke="#f0f0f0" stroke-width="2" fill="none"/>
    <path d="M52 32 Q62 24 70 31" stroke="#f0f0f0" stroke-width="2" fill="none"/>
    <path d="M110 31 Q118 24 128 32" stroke="#f0f0f0" stroke-width="2" fill="none"/>
  </svg>`;
  return '';
}

renderStoryList();
</script>
</body>
</html>
